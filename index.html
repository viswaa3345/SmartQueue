<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Queue - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-1: #101827;
            --bg-2: #1b1f2a;
            --bg-3: #2a1f18;
            --panel: rgba(10, 18, 34, 0.74);
            --panel-edge: rgba(255, 255, 255, 0.12);
            --text: #f8fafc;
            --muted: #cbd5e1;
            --accent: #d4a24c;
            --accent-2: #f97316;
            --field: rgba(255, 255, 255, 0.08);
        }

        body {
            background:
                radial-gradient(circle at 50% 20%, rgba(212, 162, 76, 0.26), transparent 18%),
                radial-gradient(circle at 50% 34%, rgba(249, 115, 22, 0.18), transparent 20%),
                radial-gradient(circle at 18% 18%, rgba(212, 162, 76, 0.16), transparent 20%),
                radial-gradient(circle at 82% 18%, rgba(255, 255, 255, 0.07), transparent 20%),
                radial-gradient(circle at 50% 100%, rgba(9, 14, 28, 0.0) 0%, rgba(9, 14, 28, 0.18) 40%, rgba(9, 14, 28, 0.62) 100%),
                linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 58%, var(--bg-3) 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.022) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.022) 1px, transparent 1px),
                radial-gradient(circle at 50% 18%, rgba(255, 245, 224, 0.08) 0, transparent 10%),
                radial-gradient(circle at 50% 26%, rgba(255, 200, 120, 0.11) 0, transparent 14%),
                radial-gradient(circle at 50% 72%, rgba(212, 162, 76, 0.08) 0, transparent 22%),
                linear-gradient(to right,
                    rgba(255, 255, 255, 0.03) 0 1.5%,
                    transparent 1.5% 10%,
                    rgba(255, 255, 255, 0.04) 10% 12%,
                    transparent 12% 88%,
                    rgba(255, 255, 255, 0.04) 88% 90%,
                    transparent 90% 98.5%,
                    rgba(255, 255, 255, 0.03) 98.5% 100%);
            background-size: 56px 56px, 56px 56px, 100% 100%, 100% 100%, 100% 100%, 100% 100%;
            opacity: 0.8;
        }

        body::after {
            content: '';
            position: fixed;
            inset: auto 0 0 0;
            height: 46vh;
            pointer-events: none;
            background:
                linear-gradient(to top, rgba(6, 10, 20, 0.90), rgba(6, 10, 20, 0.14)),
                radial-gradient(circle at 50% 92%, rgba(212, 162, 76, 0.18), transparent 26%),
                linear-gradient(90deg,
                    transparent 0 12%,
                    rgba(255, 255, 255, 0.05) 12% 14%,
                    transparent 14% 28%,
                    rgba(255, 255, 255, 0.05) 28% 30%,
                    transparent 30% 70%,
                    rgba(255, 255, 255, 0.05) 70% 72%,
                    transparent 72% 86%,
                    rgba(255, 255, 255, 0.05) 86% 88%,
                    transparent 88% 100%);
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: var(--panel);
            border: 1px solid var(--panel-edge);
            border-radius: 24px;
            box-shadow: 0 28px 70px rgba(0, 0, 0, 0.42);
            overflow: hidden;
            max-width: 420px;
            width: 100%;
            backdrop-filter: blur(18px) saturate(120%);
            -webkit-backdrop-filter: blur(18px) saturate(120%);
        }

        .login-header {
            background:
                linear-gradient(135deg, rgba(212, 162, 76, 0.95) 0%, rgba(249, 115, 22, 0.90) 58%, rgba(251, 146, 60, 0.92) 100%),
                radial-gradient(circle at top, rgba(255, 255, 255, 0.22), transparent 56%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 70%);
            color: var(--text);
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-header::after {
            content: '';
            position: absolute;
            inset: auto -10% -45% -10%;
            height: 110px;
            background:
                radial-gradient(circle, rgba(255, 255, 255, 0.18) 0, transparent 60%),
                linear-gradient(90deg, transparent 0, rgba(255, 255, 255, 0.07) 50%, transparent 100%);
            filter: blur(1px);
        }

        .login-header h2 {
            margin: 0;
            font-weight: 700;
            font-size: 2.2rem;
        }

        .login-header p {
            margin: 10px 0 0 0;
            opacity: 0.92;
        }

        .login-body {
            padding: 40px 30px;
            color: var(--text);
        }

        .role-selector {
            display: flex;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            padding: 5px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .role-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 45px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .role-btn.active {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.28);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--muted);
            display: block;
        }

        .form-control {
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 15px 20px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: var(--field);
            color: var(--text);
        }

        .form-control::placeholder {
            color: rgba(248, 250, 252, 0.48);
        }

        .form-control:focus {
            border-color: rgba(245, 158, 11, 0.75);
            box-shadow: 0 0 0 0.2rem rgba(245, 158, 11, 0.18);
            background: rgba(255, 255, 255, 0.12);
            color: var(--text);
        }

        .btn-login {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(245, 158, 11, 0.28);
        }

        .btn-register {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(245, 158, 11, 0.9);
            color: #fbbf24;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .btn-register:hover {
            background: rgba(212, 162, 76, 0.95);
            color: white;
        }

        .alert {
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .register-section {
            display: none;
        }

        .register-section.active {
            display: block;
        }

        .back-to-login {
            text-align: center;
            margin-top: 20px;
        }

        .back-to-login a {
            color: #fcd34d;
            text-decoration: none;
            font-weight: 600;
        }

        .back-to-login a:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
        }

        .loading.show {
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2><i class="fas fa-utensils"></i> Smart Queue</h2>
                <p>Food Token Booking System</p>
            </div>

            <div class="login-body">
                <div id="loginSection">
                    <div class="role-selector">
                        <button type="button" class="role-btn active" data-role="customer">
                            <i class="fas fa-user"></i> Customer
                        </button>
                        <button type="button" class="role-btn" data-role="admin">
                            <i class="fas fa-user-tie"></i> Admin
                        </button>
                    </div>

                    <div id="alertContainer"></div>

                    <form id="loginForm">
                        <div class="form-group">
                            <label for="username">Email Address</label>
                            <input type="email" class="form-control" id="username" name="username" required>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>

                        <button type="submit" class="btn btn-login">
                            <span class="loading"><i class="fas fa-spinner fa-spin"></i></span>
                            <span class="text">LOGIN</span>
                        </button>
                    </form>

                    <div class="text-center mt-3" id="customerOptions">
                        <p class="mb-0">Don't have an account?</p>
                        <button type="button" class="btn btn-register" onclick="showRegister()">
                            CREATE ACCOUNT
                        </button>
                    </div>
                </div>

                <div id="registerSection" class="register-section">
                    <h4 class="text-center mb-4">Create Customer Account</h4>

                    <div id="registerAlertContainer"></div>

                    <form id="registerForm">
                        <div class="form-group">
                            <label for="regName">Full Name</label>
                            <input type="text" class="form-control" id="regName" name="name" required>
                        </div>

                        <div class="form-group">
                            <label for="regUsername">Username</label>
                            <input type="text" class="form-control" id="regUsername" name="username" required>
                        </div>

                        <div class="form-group">
                            <label for="regEmail">Email (Optional)</label>
                            <input type="email" class="form-control" id="regEmail" name="email">
                        </div>

                        <div class="form-group">
                            <label for="regPhone">Phone (Optional)</label>
                            <input type="tel" class="form-control" id="regPhone" name="phone">
                        </div>

                        <div class="form-group">
                            <label for="regPassword">Password</label>
                            <input type="password" class="form-control" id="regPassword" name="password" required>
                        </div>

                        <button type="submit" class="btn btn-login">
                            <span class="loading"><i class="fas fa-spinner fa-spin"></i></span>
                            <span class="text">CREATE ACCOUNT</span>
                        </button>
                    </form>

                    <div class="back-to-login">
                        <a href="#" onclick="showLogin(); return false;">← Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let selectedRole = 'customer';

        document.querySelectorAll('.role-btn').forEach((btn) => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.role-btn').forEach((button) => button.classList.remove('active'));
                this.classList.add('active');
                selectedRole = this.dataset.role;

                const customerOptions = document.getElementById('customerOptions');
                customerOptions.style.display = selectedRole === 'customer' ? 'block' : 'none';
            });
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const loadingSpan = this.querySelector('.loading');
            const textSpan = this.querySelector('.text');
            const submitBtn = this.querySelector('button[type="submit"]');

            loadingSpan.classList.add('show');
            textSpan.textContent = 'LOGGING IN...';
            submitBtn.disabled = true;

            const formData = new FormData(this);
            const email = formData.get('username');
            const password = formData.get('password');

            try {
                const response = await fetch('auth/login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}&role=${encodeURIComponent(selectedRole)}`
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('success', 'Login successful! Redirecting...');

                    const redirectUrl = selectedRole === 'admin' ? 'admin_dashboard.html' : 'user_dashboard.html';

                    localStorage.setItem('currentUser', JSON.stringify({
                        id: result.user.id,
                        email: result.user.email,
                        name: result.user.name,
                        role: result.user.role,
                        selectedRole: selectedRole
                    }));

                    window.location.href = redirectUrl;
                } else {
                    showAlert('danger', result.message);
                }
            } catch (error) {
                showAlert('danger', 'Connection error: ' + error.message);
            } finally {
                loadingSpan.classList.remove('show');
                textSpan.textContent = 'LOGIN';
                submitBtn.disabled = false;
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const loadingSpan = this.querySelector('.loading');
            const textSpan = this.querySelector('.text');
            const submitBtn = this.querySelector('button[type="submit"]');

            loadingSpan.classList.add('show');
            textSpan.textContent = 'CREATING...';
            submitBtn.disabled = true;

            const formData = new FormData(this);
            const data = {
                name: formData.get('name'),
                username: formData.get('username'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                password: formData.get('password')
            };

            try {
                const response = await fetch('api/register.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('success', result.message + ' Redirecting...', 'registerAlertContainer');
                    setTimeout(() => {
                        window.location.href = result.redirect;
                    }, 1000);
                } else {
                    showAlert('danger', result.error, 'registerAlertContainer');
                }
            } catch (error) {
                showAlert('danger', 'Connection error. Please try again.', 'registerAlertContainer');
            } finally {
                loadingSpan.classList.remove('show');
                textSpan.textContent = 'CREATE ACCOUNT';
                submitBtn.disabled = false;
            }
        });

        function showAlert(type, message, container = 'alertContainer') {
            const alertContainer = document.getElementById(container);
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        function showRegister() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('registerSection').classList.add('active');
        }

        function showLogin() {
            document.getElementById('registerSection').classList.remove('active');
            document.getElementById('loginSection').style.display = 'block';
        }

        document.getElementById('customerOptions').style.display = 'block';
    </script>
</body>
</html>
